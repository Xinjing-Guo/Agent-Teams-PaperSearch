<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="marshallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="domainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4db"/>
      <stop offset="100%" style="stop-color:#0083b0"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c471ed"/>
      <stop offset="100%" style="stop-color:#f64f59"/>
    </linearGradient>
    <linearGradient id="archivistGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="librarianGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5af19"/>
      <stop offset="100%" style="stop-color:#f12711"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="rgba(255,255,255,0.6)"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38ef7d"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00b4db"/>
    </marker>
    <marker id="arrowMagenta" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c471ed"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4facfe"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f5af19"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="white" font-size="22" font-weight="700" letter-spacing="1">Agent Teams PaperSearch</text>
  <text x="450" y="64" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">Multi-Agent Academic Paper Search Framework</text>

  <!-- User Input -->
  <rect x="310" y="80" width="280" height="40" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="450" y="105" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13" font-style="italic">/paper-search "your query"</text>

  <!-- Arrow: User to Marshall -->
  <line x1="450" y1="120" x2="450" y2="140" stroke="rgba(255,255,255,0.4)" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- Phase 1 Label -->
  <text x="30" y="185" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" transform="rotate(-90,30,185)">PHASE 1</text>

  <!-- Marshall Box -->
  <rect x="280" y="145" width="340" height="55" rx="12" fill="url(#marshallGrad)" filter="url(#shadow)"/>
  <text x="320" y="170" fill="white" font-size="15" font-weight="700">Marshall</text>
  <text x="320" y="188" fill="rgba(255,255,255,0.7)" font-size="11">Coordinator — dispatches 3 scouts in parallel</text>
  <circle cx="300" cy="172" r="14" fill="rgba(255,255,255,0.15)"/>
  <text x="300" y="177" text-anchor="middle" fill="white" font-size="14">🎯</text>

  <!-- Parallel arrows from Marshall -->
  <line x1="350" y1="200" x2="150" y2="245" stroke="#38ef7d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <line x1="450" y1="200" x2="450" y2="245" stroke="#00b4db" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowCyan)"/>
  <line x1="550" y1="200" x2="750" y2="245" stroke="#c471ed" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowMagenta)"/>

  <!-- PARALLEL badge -->
  <rect x="390" y="215" width="120" height="20" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="450" y="229" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="9" font-weight="600" letter-spacing="2">⚡ PARALLEL</text>

  <!-- Scout-Core Box -->
  <rect x="50" y="250" width="220" height="130" rx="12" fill="rgba(17,153,142,0.15)" stroke="#38ef7d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="250" width="220" height="32" rx="12" fill="url(#coreGrad)"/>
  <rect x="50" y="270" width="220" height="12" fill="url(#coreGrad)"/>
  <text x="80" y="272" fill="white" font-size="14" font-weight="700">Scout-Core</text>
  <text x="195" y="272" fill="rgba(255,255,255,0.7)" font-size="10">Tier 1</text>
  <text x="70" y="302" fill="rgba(255,255,255,0.8)" font-size="11">● Google Scholar</text>
  <text x="70" y="320" fill="rgba(255,255,255,0.8)" font-size="11">● Semantic Scholar</text>
  <text x="70" y="338" fill="rgba(255,255,255,0.8)" font-size="11">● OpenAlex</text>
  <text x="70" y="356" fill="rgba(255,255,255,0.8)" font-size="11">● CrossRef</text>
  <rect x="180" y="358" width="80" height="18" rx="9" fill="rgba(56,239,125,0.2)"/>
  <text x="220" y="371" text-anchor="middle" fill="#38ef7d" font-size="10" font-weight="600">4 databases</text>

  <!-- Scout-Domain Box -->
  <rect x="310" y="250" width="280" height="130" rx="12" fill="rgba(0,180,219,0.12)" stroke="#00b4db" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="310" y="250" width="280" height="32" rx="12" fill="url(#domainGrad)"/>
  <rect x="310" y="270" width="280" height="12" fill="url(#domainGrad)"/>
  <text x="340" y="272" fill="white" font-size="14" font-weight="700">Scout-Domain</text>
  <text x="510" y="272" fill="rgba(255,255,255,0.7)" font-size="10">Tier 2</text>
  <text x="325" y="302" fill="rgba(255,255,255,0.8)" font-size="11">● arXiv  ● PubMed  ● bioRxiv</text>
  <text x="325" y="320" fill="rgba(255,255,255,0.8)" font-size="11">● medRxiv  ● DBLP  ● SSRN</text>
  <text x="325" y="338" fill="rgba(255,255,255,0.8)" font-size="11">● OpenAIRE  ● BASE  ● CORE</text>
  <text x="325" y="356" fill="rgba(255,255,255,0.8)" font-size="11">● DOAJ  ● Zenodo  ● Unpaywall ...</text>
  <rect x="470" y="358" width="105" height="18" rx="9" fill="rgba(0,180,219,0.25)"/>
  <text x="522" y="371" text-anchor="middle" fill="#00b4db" font-size="10" font-weight="600">15 databases</text>

  <!-- Scout-Cloud Box -->
  <rect x="630" y="250" width="220" height="130" rx="12" fill="rgba(196,113,237,0.12)" stroke="#c471ed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="630" y="250" width="220" height="32" rx="12" fill="url(#cloudGrad)"/>
  <rect x="630" y="270" width="220" height="12" fill="url(#cloudGrad)"/>
  <text x="660" y="272" fill="white" font-size="14" font-weight="700">Scout-Cloud</text>
  <text x="780" y="272" fill="rgba(255,255,255,0.7)" font-size="10">Tier 3</text>
  <text x="650" y="302" fill="rgba(255,255,255,0.8)" font-size="11">● Consensus (AI)</text>
  <text x="650" y="320" fill="rgba(255,255,255,0.8)" font-size="11">● Scholar Gateway</text>
  <text x="650" y="338" fill="rgba(255,255,255,0.8)" font-size="11">● ResearchGate (Tavily)</text>
  <rect x="760" y="340" width="80" height="18" rx="9" fill="rgba(196,113,237,0.25)"/>
  <text x="800" y="353" text-anchor="middle" fill="#c471ed" font-size="10" font-weight="600">3 sources</text>

  <!-- Phase 2 Label -->
  <text x="30" y="455" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" transform="rotate(-90,30,455)">PHASE 2</text>

  <!-- Converging arrows to Archivist -->
  <line x1="160" y1="380" x2="380" y2="425" stroke="#38ef7d" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrowBlue)"/>
  <line x1="450" y1="380" x2="450" y2="425" stroke="#00b4db" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrowBlue)"/>
  <line x1="740" y1="380" x2="520" y2="425" stroke="#c471ed" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrowBlue)"/>

  <!-- Archivist Box -->
  <rect x="280" y="430" width="340" height="75" rx="12" fill="rgba(79,172,254,0.12)" stroke="#4facfe" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="430" width="340" height="32" rx="12" fill="url(#archivistGrad)"/>
  <rect x="280" y="450" width="340" height="12" fill="url(#archivistGrad)"/>
  <circle cx="300" cy="448" r="14" fill="rgba(255,255,255,0.15)"/>
  <text x="300" y="453" text-anchor="middle" fill="white" font-size="14">📋</text>
  <text x="325" y="452" fill="white" font-size="14" font-weight="700">Archivist</text>
  <text x="300" y="478" fill="rgba(255,255,255,0.7)" font-size="11">Deduplicate by DOI/title → Rank by citations</text>
  <text x="300" y="494" fill="rgba(255,255,255,0.7)" font-size="11">Verify citations → Format final report</text>

  <!-- Phase 3 Label -->
  <text x="30" y="555" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" transform="rotate(-90,30,555)">PHASE 3</text>

  <!-- Arrow to User Decision -->
  <line x1="450" y1="505" x2="450" y2="530" stroke="rgba(255,255,255,0.4)" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- User Decision -->
  <polygon points="450,535 550,560 450,585 350,560" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="450" y="564" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12" font-weight="600">Download?</text>

  <!-- Phase 4 Label -->
  <text x="30" y="635" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" transform="rotate(-90,30,635)">PHASE 4</text>

  <!-- Arrow to Librarian -->
  <line x1="450" y1="585" x2="450" y2="605" stroke="rgba(255,255,255,0.4)" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Librarian Box -->
  <rect x="280" y="610" width="340" height="55" rx="12" fill="rgba(245,175,25,0.12)" stroke="#f5af19" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="610" width="340" height="32" rx="12" fill="url(#librarianGrad)"/>
  <rect x="280" y="630" width="340" height="12" fill="url(#librarianGrad)"/>
  <circle cx="300" cy="628" r="14" fill="rgba(255,255,255,0.15)"/>
  <text x="300" y="633" text-anchor="middle" fill="white" font-size="14">📥</text>
  <text x="325" y="632" fill="white" font-size="14" font-weight="700">Librarian</text>
  <text x="300" y="655" fill="rgba(255,255,255,0.7)" font-size="11">curl download → fallback chain → manual links</text>

  <!-- Side decorations: database count -->
  <rect x="745" y="80" width="130" height="50" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="810" y="100" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">TOTAL COVERAGE</text>
  <text x="810" y="122" text-anchor="middle" fill="white" font-size="20" font-weight="700">22</text>

  <rect x="745" y="135" width="130" height="22" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="810" y="150" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">databases + sources</text>
</svg>
