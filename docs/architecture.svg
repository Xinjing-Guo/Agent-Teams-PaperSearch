<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 880" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="marshallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="domainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4db"/>
      <stop offset="100%" style="stop-color:#0083b0"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c471ed"/>
      <stop offset="100%" style="stop-color:#f64f59"/>
    </linearGradient>
    <linearGradient id="archivistGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="librarianGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5af19"/>
      <stop offset="100%" style="stop-color:#f12711"/>
    </linearGradient>
    <linearGradient id="reviewGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="scihubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6a00"/>
      <stop offset="100%" style="stop-color:#ee0979"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="rgba(255,255,255,0.6)"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38ef7d"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00b4db"/>
    </marker>
    <marker id="arrowMagenta" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c471ed"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4facfe"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f5af19"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fed6e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="880" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" fill="white" font-size="22" font-weight="700" letter-spacing="1">Agent Teams PaperSearch</text>
  <text x="480" y="64" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">Multi-Agent Academic Paper Search, Download &amp; Review Framework</text>

  <!-- User Input -->
  <rect x="340" y="80" width="280" height="40" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="480" y="105" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13" font-style="italic">/paper-search "your query"</text>

  <!-- Arrow: User to Marshall -->
  <line x1="480" y1="120" x2="480" y2="140" stroke="rgba(255,255,255,0.4)" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- ========== PHASE 1: SEARCH ========== -->
  <text x="30" y="185" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" transform="rotate(-90,30,185)">PHASE 1</text>
  <text x="30" y="155" fill="rgba(255,255,255,0.15)" font-size="9" transform="rotate(-90,30,155)">SEARCH</text>

  <!-- Marshall Box -->
  <rect x="310" y="145" width="340" height="55" rx="12" fill="url(#marshallGrad)" filter="url(#shadow)"/>
  <circle cx="330" cy="172" r="14" fill="rgba(255,255,255,0.15)"/>
  <text x="330" y="177" text-anchor="middle" fill="white" font-size="14">🎯</text>
  <text x="355" y="170" fill="white" font-size="15" font-weight="700">Marshall</text>
  <text x="355" y="188" fill="rgba(255,255,255,0.7)" font-size="11">Coordinator — dispatches 3 scouts in parallel</text>

  <!-- Parallel arrows from Marshall -->
  <line x1="380" y1="200" x2="170" y2="245" stroke="#38ef7d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <line x1="480" y1="200" x2="480" y2="245" stroke="#00b4db" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowCyan)"/>
  <line x1="580" y1="200" x2="790" y2="245" stroke="#c471ed" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowMagenta)"/>

  <!-- PARALLEL badge -->
  <rect x="420" y="215" width="120" height="20" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="480" y="229" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="9" font-weight="600" letter-spacing="2">PARALLEL</text>

  <!-- Scout-Core Box -->
  <rect x="60" y="250" width="220" height="130" rx="12" fill="rgba(17,153,142,0.15)" stroke="#38ef7d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="250" width="220" height="32" rx="12" fill="url(#coreGrad)"/>
  <rect x="60" y="270" width="220" height="12" fill="url(#coreGrad)"/>
  <text x="90" y="272" fill="white" font-size="14" font-weight="700">Scout-Core</text>
  <text x="205" y="272" fill="rgba(255,255,255,0.7)" font-size="10">Tier 1</text>
  <text x="80" y="302" fill="rgba(255,255,255,0.8)" font-size="11">Google Scholar</text>
  <text x="80" y="320" fill="rgba(255,255,255,0.8)" font-size="11">Semantic Scholar</text>
  <text x="80" y="338" fill="rgba(255,255,255,0.8)" font-size="11">OpenAlex</text>
  <text x="80" y="356" fill="rgba(255,255,255,0.8)" font-size="11">CrossRef</text>
  <rect x="190" y="358" width="80" height="18" rx="9" fill="rgba(56,239,125,0.2)"/>
  <text x="230" y="371" text-anchor="middle" fill="#38ef7d" font-size="10" font-weight="600">4 databases</text>

  <!-- Scout-Domain Box -->
  <rect x="340" y="250" width="280" height="130" rx="12" fill="rgba(0,180,219,0.12)" stroke="#00b4db" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="340" y="250" width="280" height="32" rx="12" fill="url(#domainGrad)"/>
  <rect x="340" y="270" width="280" height="12" fill="url(#domainGrad)"/>
  <text x="370" y="272" fill="white" font-size="14" font-weight="700">Scout-Domain</text>
  <text x="540" y="272" fill="rgba(255,255,255,0.7)" font-size="10">Tier 2</text>
  <text x="355" y="302" fill="rgba(255,255,255,0.8)" font-size="11">arXiv · PubMed · bioRxiv</text>
  <text x="355" y="320" fill="rgba(255,255,255,0.8)" font-size="11">medRxiv · DBLP · SSRN</text>
  <text x="355" y="338" fill="rgba(255,255,255,0.8)" font-size="11">OpenAIRE · BASE · CORE</text>
  <text x="355" y="356" fill="rgba(255,255,255,0.8)" font-size="11">DOAJ · Zenodo · Unpaywall ...</text>
  <rect x="500" y="358" width="105" height="18" rx="9" fill="rgba(0,180,219,0.25)"/>
  <text x="552" y="371" text-anchor="middle" fill="#00b4db" font-size="10" font-weight="600">15 databases</text>

  <!-- Scout-Cloud Box -->
  <rect x="680" y="250" width="220" height="130" rx="12" fill="rgba(196,113,237,0.12)" stroke="#c471ed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="680" y="250" width="220" height="32" rx="12" fill="url(#cloudGrad)"/>
  <rect x="680" y="270" width="220" height="12" fill="url(#cloudGrad)"/>
  <text x="710" y="272" fill="white" font-size="14" font-weight="700">Scout-Cloud</text>
  <text x="830" y="272" fill="rgba(255,255,255,0.7)" font-size="10">Tier 3</text>
  <text x="700" y="302" fill="rgba(255,255,255,0.8)" font-size="11">Consensus (AI)</text>
  <text x="700" y="320" fill="rgba(255,255,255,0.8)" font-size="11">Scholar Gateway</text>
  <text x="700" y="338" fill="rgba(255,255,255,0.8)" font-size="11">ResearchGate (Tavily)</text>
  <rect x="810" y="340" width="80" height="18" rx="9" fill="rgba(196,113,237,0.25)"/>
  <text x="850" y="353" text-anchor="middle" fill="#c471ed" font-size="10" font-weight="600">3 sources</text>

  <!-- ========== PHASE 2: AGGREGATE ========== -->
  <text x="30" y="450" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" transform="rotate(-90,30,450)">PHASE 2</text>
  <text x="30" y="420" fill="rgba(255,255,255,0.15)" font-size="9" transform="rotate(-90,30,420)">AGGREGATE</text>

  <!-- Converging arrows to Archivist -->
  <line x1="170" y1="380" x2="400" y2="415" stroke="#38ef7d" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrowBlue)"/>
  <line x1="480" y1="380" x2="480" y2="415" stroke="#00b4db" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrowBlue)"/>
  <line x1="790" y1="380" x2="560" y2="415" stroke="#c471ed" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrowBlue)"/>

  <!-- Archivist Box -->
  <rect x="310" y="420" width="340" height="80" rx="12" fill="rgba(79,172,254,0.12)" stroke="#4facfe" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="310" y="420" width="340" height="32" rx="12" fill="url(#archivistGrad)"/>
  <rect x="310" y="440" width="340" height="12" fill="url(#archivistGrad)"/>
  <circle cx="330" cy="438" r="14" fill="rgba(255,255,255,0.15)"/>
  <text x="330" y="443" text-anchor="middle" fill="white" font-size="14">📋</text>
  <text x="355" y="442" fill="white" font-size="14" font-weight="700">Archivist</text>
  <text x="325" y="470" fill="rgba(255,255,255,0.7)" font-size="11">Deduplicate by DOI/title · Rank by citations</text>
  <text x="325" y="488" fill="rgba(255,255,255,0.7)" font-size="11">Collect abstracts · Verify citation claims</text>

  <!-- ========== PHASE 3: DOWNLOAD ========== -->
  <text x="30" y="575" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" transform="rotate(-90,30,575)">PHASE 3</text>
  <text x="30" y="545" fill="rgba(255,255,255,0.15)" font-size="9" transform="rotate(-90,30,545)">DOWNLOAD</text>

  <line x1="480" y1="500" x2="480" y2="520" stroke="rgba(255,255,255,0.4)" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Librarian Box -->
  <rect x="230" y="525" width="500" height="95" rx="12" fill="rgba(245,175,25,0.12)" stroke="#f5af19" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="230" y="525" width="500" height="32" rx="12" fill="url(#librarianGrad)"/>
  <rect x="230" y="545" width="500" height="12" fill="url(#librarianGrad)"/>
  <circle cx="250" cy="543" r="14" fill="rgba(255,255,255,0.15)"/>
  <text x="250" y="548" text-anchor="middle" fill="white" font-size="14">📥</text>
  <text x="275" y="547" fill="white" font-size="14" font-weight="700">Librarian</text>

  <!-- Download steps inside Librarian -->
  <text x="250" y="575" fill="rgba(255,255,255,0.6)" font-size="10" font-weight="600">P1</text>
  <text x="270" y="575" fill="rgba(255,255,255,0.8)" font-size="11">curl: arXiv / bioRxiv / MDPI (auto)</text>

  <text x="250" y="593" fill="rgba(255,175,25,0.8)" font-size="10" font-weight="600">P2</text>
  <text x="270" y="593" fill="rgba(255,255,255,0.8)" font-size="11">Sci-Hub: sci-hub.ru → sci-hub.st (auto, Playwright)</text>

  <text x="530" y="575" fill="rgba(255,255,255,0.6)" font-size="10" font-weight="600">P3</text>
  <text x="550" y="575" fill="rgba(255,255,255,0.8)" font-size="11">Verify: %PDF header + size > 5KB</text>

  <text x="530" y="593" fill="rgba(255,100,100,0.8)" font-size="10" font-weight="600">P4</text>
  <text x="550" y="593" fill="rgba(255,255,255,0.8)" font-size="11">Browser batch open (user confirms)</text>

  <!-- Confirm badge on P4 -->
  <rect x="700" y="584" width="20" height="14" rx="3" fill="rgba(255,100,100,0.3)" stroke="rgba(255,100,100,0.5)" stroke-width="0.5"/>
  <text x="710" y="594" text-anchor="middle" fill="rgba(255,150,150,0.9)" font-size="8" font-weight="600">?</text>

  <!-- ========== PHASE 4: REVIEW ========== -->
  <text x="30" y="700" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" transform="rotate(-90,30,700)">PHASE 4</text>
  <text x="30" y="670" fill="rgba(255,255,255,0.15)" font-size="9" transform="rotate(-90,30,670)">REVIEW</text>

  <line x1="480" y1="620" x2="480" y2="645" stroke="rgba(255,255,255,0.4)" stroke-width="2" marker-end="url(#arrowPink)"/>

  <!-- Review Generation Box -->
  <rect x="230" y="650" width="500" height="90" rx="12" fill="rgba(168,237,234,0.08)" stroke="#a8edea" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="230" y="650" width="500" height="32" rx="12" fill="url(#reviewGrad)"/>
  <rect x="230" y="670" width="500" height="12" fill="url(#reviewGrad)"/>
  <circle cx="250" cy="668" r="14" fill="rgba(0,0,0,0.15)"/>
  <text x="250" y="673" text-anchor="middle" fill="#302b63" font-size="14">📝</text>
  <text x="275" y="672" fill="#302b63" font-size="14" font-weight="700">Review Generator</text>

  <text x="250" y="700" fill="rgba(255,255,255,0.8)" font-size="11">Group papers by approach · Summarize each contribution</text>
  <text x="250" y="718" fill="rgba(255,255,255,0.8)" font-size="11">Chronological evolution · IEEE references · Export .md</text>

  <!-- ========== OUTPUT ========== -->
  <line x1="480" y1="740" x2="480" y2="760" stroke="rgba(255,255,255,0.4)" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- Output files -->
  <rect x="200" y="765" width="560" height="95" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="480" y="787" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-weight="600" letter-spacing="2">OUTPUT</text>

  <!-- File icons -->
  <rect x="225" y="800" width="105" height="45" rx="8" fill="rgba(79,172,254,0.15)" stroke="rgba(79,172,254,0.4)" stroke-width="1"/>
  <text x="277" y="818" text-anchor="middle" fill="#4facfe" font-size="10" font-weight="600">search-log.md</text>
  <text x="277" y="835" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">26 papers + DBs</text>

  <rect x="345" y="800" width="105" height="45" rx="8" fill="rgba(245,175,25,0.15)" stroke="rgba(245,175,25,0.4)" stroke-width="1"/>
  <text x="397" y="818" text-anchor="middle" fill="#f5af19" font-size="10" font-weight="600">papers/*.pdf</text>
  <text x="397" y="835" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">Downloaded PDFs</text>

  <rect x="465" y="800" width="125" height="45" rx="8" fill="rgba(245,175,25,0.15)" stroke="rgba(245,175,25,0.4)" stroke-width="1"/>
  <text x="527" y="818" text-anchor="middle" fill="#f5af19" font-size="10" font-weight="600">download-log.md</text>
  <text x="527" y="835" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">Status + links</text>

  <rect x="605" y="800" width="135" height="45" rx="8" fill="rgba(168,237,234,0.15)" stroke="rgba(168,237,234,0.4)" stroke-width="1"/>
  <text x="672" y="818" text-anchor="middle" fill="#a8edea" font-size="10" font-weight="600">Review Article.md</text>
  <text x="672" y="835" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">Categorized + refs</text>

  <!-- Side stats -->
  <rect x="795" y="80" width="140" height="55" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="865" y="98" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">TOTAL COVERAGE</text>
  <text x="865" y="124" text-anchor="middle" fill="white" font-size="22" font-weight="700">22</text>

  <rect x="795" y="140" width="140" height="22" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="865" y="155" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">databases + sources</text>

  <!-- Sci-Hub badge -->
  <rect x="795" y="170" width="140" height="30" rx="8" fill="rgba(255,106,0,0.1)" stroke="rgba(255,106,0,0.3)" stroke-width="1"/>
  <text x="865" y="190" text-anchor="middle" fill="rgba(255,106,0,0.8)" font-size="10" font-weight="600">Sci-Hub: .ru · .st</text>

  <!-- Playwright badge -->
  <rect x="795" y="205" width="140" height="30" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="865" y="225" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-weight="600">Playwright browser</text>
</svg>
